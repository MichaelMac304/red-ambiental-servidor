<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>IoT Debug Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; display:flex; font-family:Arial; background:#0e0e0e; color:white; }

#map { width:75%; height:100vh; }

#panel {
  width:25%;
  background:#111;
  padding:10px;
  overflow:auto;
}

.card {
  background:#222;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
  font-size:13px;
}

.ok { color:lime; }
.bad { color:red; }
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>📡 DEBUG NODOS</h3>
  <div id="nodes"></div>
</div>

<script>

var map = L.map('map').setView([-33.3918, -56.5189], 18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

let markers = {};

function color(t){
  if(t > 40) return "red";
  if(t > 25) return "orange";
  return "blue";
}

async function update(){

  try {

    let res = await fetch("https://red-ambiental-servidor.onrender.com/nodes");
    let data = await res.json();

    console.log("SERVER DATA:", data);

    document.getElementById("nodes").innerHTML = "";

    Object.values(data).forEach(n => {

      document.getElementById("nodes").innerHTML += `
        <div class="card">
          <b>${n.id}</b><br>
          🌡 ${n.temp}°C<br>
          📍 ${n.lat}, ${n.lon}
        </div>
      `;

      let c = color(n.temp);

      if(!markers[n.id]){
        markers[n.id] = L.circleMarker([n.lat, n.lon], {
          radius: 10,
          color: c,
          fillColor: c,
          fillOpacity: 0.8
        }).addTo(map);
      } else {
        markers[n.id].setLatLng([n.lat, n.lon]);
        markers[n.id].setStyle({color:c, fillColor:c});
      }

    });

  } catch(e){
    console.log("ERROR FETCH:", e);
  }
}

setInterval(update, 2000);
update();

</script>

</body>
</html>
