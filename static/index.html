<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Red Ambiental IoT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
  background: #0e0e0e;
  color: white;
}

#map {
  width: 75%;
  height: 100vh;
}

#panel {
  width: 25%;
  height: 100vh;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}

.card {
  background: #1e1e1e;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>📡 Nodos</h3>
  <div id="nodes"></div>
</div>

<script>

var map = L.map('map').setView([-33.3918, -56.5189], 18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

let markers = {};
let lines = {};

function getColor(t){
  if(t > 40) return "red";
  if(t > 25) return "orange";
  return "blue";
}

function drawLine(n1, n2){

  let key = n1.id + "-" + n2.id;

  if(!lines[key]){
    lines[key] = L.polyline([
      [n1.lat, n1.lon],
      [n2.lat, n2.lon]
    ], {
      color: "cyan",
      weight: 3
    }).addTo(map);
  } else {
    lines[key].setLatLngs([
      [n1.lat, n1.lon],
      [n2.lat, n2.lon]
    ]);
  }
}

async function update(){

  let res = await fetch("/nodes");
  let data = await res.json();

  let arr = Object.values(data);

  document.getElementById("nodes").innerHTML = "";

  let gateway = arr.find(n => n.id === "GATEWAY");

  arr.forEach(n => {

    document.getElementById("nodes").innerHTML += `
      <div class="card">
        <b>${n.id}</b><br>
        🌡 ${n.temp}°C<br>
        📍 ${n.lat}, ${n.lon}
      </div>
    `;

    let c = getColor(n.temp);

    if(!markers[n.id]){
      markers[n.id] = L.circleMarker([n.lat, n.lon], {
        radius: 8,
        color: c,
        fillColor: c,
        fillOpacity: 0.9
      }).addTo(map);
    } else {
      markers[n.id].setLatLng([n.lat, n.lon]);
      markers[n.id].setStyle({color:c, fillColor:c});
    }

    if(gateway && n.id !== gateway.id){
      drawLine(n, gateway);
    }

  });

}

setInterval(update, 2000);
update();

</script>

</body>
</html>
