<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Red Ambiental IoT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #0e0e0e;
  color: white;
}

#map {
  width: 80%;
  height: 100vh;
}

#panel {
  width: 20%;
  height: 100vh;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}

.card {
  background: #1e1e1e;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

h2 {
  font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h2>📡 Nodos en vivo</h2>
  <div id="nodes"></div>
</div>

<script>

// ================= MAPA =================
var map = L.map('map').setView([-33.3918, -56.5189], 18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// ================= VARIABLES =================
let markers = {};
let lines = {};
let heatLayers = {};

// ================= COLOR POR TEMPERATURA =================
function getColor(temp) {
  if (temp > 40) return "#ff0000";
  if (temp > 25) return "#ff8800";
  return "#00aaff";
}

// ================= DIBUJAR LÍNEA =================
function drawLine(n1, n2) {

  let key = n1.id + "-" + n2.id;

  let latlngs = [
    [n1.lat, n1.lon],
    [n2.lat, n2.lon]
  ];

  if (!lines[key]) {
    lines[key] = L.polyline(latlngs, {
      color: "cyan",
      weight: 3,
      opacity: 0.8
    }).addTo(map);
  } else {
    lines[key].setLatLngs(latlngs);
  }
}

// ================= HEAT SIMPLIFICADO =================
function drawHeat(n) {

  let key = "heat-" + n.id;

  let color = getColor(n.temp);

  if (!heatLayers[key]) {
    heatLayers[key] = L.circle([n.lat, n.lon], {
      radius: 120,
      color: color,
      fillColor: color,
      fillOpacity: 0.25
    }).addTo(map);
  } else {
    heatLayers[key].setLatLng([n.lat, n.lon]);
    heatLayers[key].setStyle({
      color: color,
      fillColor: color
    });
  }
}

// ================= UPDATE =================
async function update() {

  let res = await fetch("https://red-ambiental-servidor.onrender.com/nodes");
  let data = await res.json();

  let nodesArr = Object.values(data);

  document.getElementById("nodes").innerHTML = "";

  // buscar gateway
  let gateway = nodesArr.find(n => n.id === "GATEWAY");

  nodesArr.forEach(n => {

    // PANEL
    document.getElementById("nodes").innerHTML += `
      <div class="card">
        <b>${n.id}</b><br>
        🌡 ${n.temp}°C<br>
        📍 ${n.lat.toFixed(5)}, ${n.lon.toFixed(5)}
      </div>
    `;

    // MARKER
    let c = getColor(n.temp);

    if (!markers[n.id]) {
      markers[n.id] = L.circleMarker([n.lat, n.lon], {
        radius: 8,
        color: c,
        fillColor: c,
        fillOpacity: 0.9
      }).addTo(map).bindPopup(n.id);
    } else {
      markers[n.id].setLatLng([n.lat, n.lon]);
      markers[n.id].setStyle({ color: c, fillColor: c });
    }

    // HEAT
    drawHeat(n);

    // LÍNEAS CON GATEWAY
    if (gateway && n.id !== gateway.id) {
      drawLine(n, gateway);
    }
  });
}

setInterval(update, 2000);
update();

</script>

</body>
</html>
